<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>IBMéier | Painel Individual de Disponibilidade</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --red: #c0392b;
  --red2: #e74c3c;
  --red-glow: rgba(192,57,43,0.3);
  --gold: #d4a853;
  --gold2: #f0c878;
  --bg: #06060e;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f4ff;
  --text-dim: #6b7a9a;
  --text-mid: #9aa3bb;
  --morning: #f1c21b;
  --night: #8a3ffc;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
}

/* background atmosférico */
.parallax-scene {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
}
.orb-1 {
  width: 700px;
  height: 700px;
  top: -200px;
  left: -200px;
  background: radial-gradient(circle, rgba(192,57,43,0.2) 0%, transparent 70%);
}
.orb-2 {
  width: 600px;
  height: 600px;
  bottom: -100px;
  right: -100px;
  background: radial-gradient(circle, rgba(15,52,96,0.25) 0%, transparent 70%);
}
.grain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.02;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
}

header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(6,6,14,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
}
.logo-area {
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo-img {
  height: 42px;
  object-fit: contain;
}
.logo-divider {
  width: 1px;
  height: 32px;
  background: var(--border2);
}
.logo-sub .logo-panel {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 0.2em;
  font-weight: 700;
}
.logo-desc {
  font-size: 9px;
  color: var(--text-dim);
}
.user-area {
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-chip {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 40px;
  padding: 5px 14px 5px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.user-avatar {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--red), var(--gold));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-family: 'Syne', sans-serif;
}
.btn-logout {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 14px;
  border-radius: 30px;
  font-size: 12px;
  cursor: pointer;
  transition: 0.2s;
}
.btn-logout:hover {
  border-color: var(--red);
  color: var(--red2);
}

main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px 80px;
  position: relative;
  z-index: 2;
}

/* LOGIN */
#loginContainer {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80vh;
}
.login-glass {
  background: rgba(12,12,24,0.8);
  backdrop-filter: blur(28px);
  border: 1px solid var(--border2);
  border-radius: 32px;
  padding: 40px 36px;
  max-width: 460px;
  width: 100%;
  text-align: center;
}
.login-logo {
  width: 140px;
  margin-bottom: 24px;
}
.login-title {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(140deg, #fff, var(--gold2));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.login-sub {
  color: var(--text-dim);
  margin: 12px 0 28px;
  font-size: 14px;
}
.select-member {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  color: var(--text);
  font-size: 15px;
  margin-bottom: 24px;
  cursor: pointer;
}
.btn-login-action {
  background: linear-gradient(135deg, var(--red), #9a2219);
  border: none;
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  font-weight: 800;
  font-family: 'Syne', sans-serif;
  color: white;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 4px 20px rgba(192,57,43,0.3);
}
.btn-login-action:hover {
  transform: translateY(-2px);
  filter: brightness(1.05);
}

/* PAINEL INDIVIDUAL */
.painel-individual {
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px);}
  to { opacity: 1; transform: translateY(0);}
}

.hero-painel {
  margin-bottom: 32px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 24px;
}
.hero-painel h1 {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(140deg, #fff, var(--gold2));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.badge-instrumento {
  background: rgba(212,168,83,0.15);
  border: 1px solid rgba(212,168,83,0.3);
  padding: 4px 14px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 600;
  display: inline-block;
  margin-top: 12px;
}
.stats-mini {
  display: flex;
  gap: 20px;
  margin: 24px 0 32px;
  flex-wrap: wrap;
}
.stat-mini-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px 24px;
  flex: 1;
  min-width: 130px;
}
.stat-mini-number {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 800;
  color: var(--gold2);
}
.stat-mini-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* GRADE DE DISPONIBILIDADE */
.disponibilidade-grade {
  margin-top: 20px;
}
.semana-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  margin-bottom: 20px;
  overflow: hidden;
  transition: 0.2s;
}
.semana-header {
  background: rgba(0,0,0,0.3);
  padding: 18px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.data-domingo {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
}
.data-domingo span {
  font-size: 13px;
  font-weight: normal;
  color: var(--text-dim);
  margin-left: 10px;
}
.cultos-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.culto-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.culto-item:last-child {
  border-bottom: none;
}
.culto-info {
  display: flex;
  align-items: center;
  gap: 14px;
}
.culto-icon {
  font-size: 24px;
  width: 36px;
  text-align: center;
}
.culto-nome {
  font-weight: 600;
}
.culto-nome small {
  font-size: 11px;
  color: var(--text-dim);
  display: block;
}
.toggle-switch {
  position: relative;
  display: inline-block;
  width: 52px;
  height: 26px;
}
.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: rgba(255,255,255,0.15);
  transition: 0.2s;
  border-radius: 34px;
}
.slider:before {
  position: absolute;
  content: "";
  height: 20px;
  width: 20px;
  left: 3px;
  bottom: 3px;
  background-color: #ccc;
  transition: 0.2s;
  border-radius: 50%;
}
input:checked + .slider {
  background-color: var(--red2);
}
input:checked + .slider:before {
  transform: translateX(26px);
  background-color: white;
}
.culto-manha .toggle-switch input:checked + .slider { background-color: var(--morning); }
.culto-noite .toggle-switch input:checked + .slider { background-color: var(--night); }
.btn-salvar {
  background: linear-gradient(135deg, var(--gold), #b87c2e);
  border: none;
  padding: 14px 28px;
  border-radius: 40px;
  font-weight: 800;
  font-family: 'Syne', sans-serif;
  color: #0a0a14;
  font-size: 14px;
  cursor: pointer;
  margin-top: 20px;
  transition: 0.2s;
  width: 100%;
  box-shadow: 0 4px 16px rgba(212,168,83,0.3);
}
.btn-salvar:hover {
  transform: translateY(-2px);
  filter: brightness(1.02);
}
.info-aviso {
  background: rgba(192,57,43,0.08);
  border-left: 3px solid var(--red);
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 12px;
  color: var(--text-dim);
  margin: 28px 0 20px;
}
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(16px);
  padding: 12px 26px;
  border-radius: 60px;
  color: var(--gold2);
  font-size: 13px;
  font-weight: 500;
  z-index: 999;
  opacity: 0;
  transition: 0.25s;
  pointer-events: none;
  white-space: nowrap;
  border: 1px solid var(--border2);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
@media (max-width: 640px) {
  .culto-item { flex-direction: column; align-items: flex-start; gap: 12px; }
  .toast { white-space: normal; width: 90%; text-align: center; }
  .stats-mini { flex-direction: column; }
}
</style>
</head>
<body>

<div class="parallax-scene">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>
<div class="grain"></div>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <img class="logo-img" src="https://static.wixstatic.com/media/430a01_070855f78e42434680537abbc733ed44~mv2.png/v1/fill/w_228,h_110,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/marca_ibmeier_horizontal_original.png" alt="IBMéier" onerror="this.style.display='none'">
      <div class="logo-divider"></div>
      <div class="logo-sub">
        <span class="logo-panel">ESCALA MUSICAL</span>
        <span class="logo-desc">Painel individual · Abril 2026</span>
      </div>
    </div>
    <div class="user-area" id="headerUserArea">
      <button class="btn-logout" id="logoutBtn" style="display:none;">Sair</button>
    </div>
  </div>
</header>

<main>
  <!-- TELA DE LOGIN -->
  <div id="loginContainer">
    <div class="login-glass">
      <img class="login-logo" src="https://static.wixstatic.com/media/430a01_070855f78e42434680537abbc733ed44~mv2.png/v1/fill/w_456,h_220,al_c,q_90,usm_0.66_1.00_0.01,enc_avif,quality_auto/marca_ibmeier_horizontal_original.png" alt="logo" onerror="this.style.display='none'">
      <div class="login-title">Acesse seu painel</div>
      <div class="login-sub">Insira sua disponibilidade para os cultos de abril</div>
      <select id="musicoSelectLogin" class="select-member">
        <option value="">-- Selecione seu nome --</option>
      </select>
      <button class="btn-login-action" id="btnEntrar">Entrar no Painel →</button>
      <div class="info-aviso" style="margin-top:24px; background:transparent; text-align:center;">
        Cada músico tem acesso exclusivo à sua própria disponibilidade.
      </div>
    </div>
  </div>

  <!-- PAINEL INDIVIDUAL (dinâmico) -->
  <div id="painelIndividual" style="display:none;"></div>
</main>

<div id="toastMsg" class="toast"></div>

<script>
  // ======================== DADOS CENTRAIS ========================
  const DOMINGOS = [
    { date: "06/04", label: "1º Domingo", num: "06" },
    { date: "13/04", label: "2º Domingo", num: "13" },
    { date: "20/04", label: "3º Domingo", num: "20" },
    { date: "27/04", label: "4º Domingo", num: "27" }
  ];

  const INSTRUMENTOS = {
    violao: "🎸 Violão", guitarra: "🎸 Guitarra", teclado: "🎹 Teclado",
    baixo: "🎸 Baixo", bateria: "🥁 Bateria", percussao: "🥁 Percussão", backing: "🎤 Backing"
  };

  // Lista de músicos (dados completos + disponibilidade individual)
  let musicians = [
    { id: 1, name: "Leo Correa", instrument: "violao", avail: { 0: { m: true, n: true }, 1: { m: false, n: false }, 2: { m: true, n: true }, 3: { m: false, n: false } } },
    { id: 2, name: "Natã", instrument: "violao", avail: { 0: { m: false, n: false }, 1: { m: true, n: false }, 2: { m: false, n: false }, 3: { m: true, n: false } } },
    { id: 3, name: "Bernardo", instrument: "violao", avail: { 0: { m: false, n: true }, 1: { m: false, n: true }, 2: { m: false, n: true }, 3: { m: false, n: true } } },
    { id: 4, name: "Cassio Leopoldino", instrument: "violao", avail: { 0: { m: true, n: false }, 1: { m: true, n: false }, 2: { m: false, n: false }, 3: { m: true, n: false } } },
    { id: 5, name: "Endy Viegas", instrument: "violao", avail: { 0: { m: false, n: false }, 1: { m: false, n: true }, 2: { m: false, n: true }, 3: { m: false, n: true } } },
    { id: 6, name: "Flávio", instrument: "guitarra", avail: { 0: { m: true, n: true }, 1: { m: false, n: true }, 2: { m: false, n: true }, 3: { m: true, n: true } } },
    { id: 7, name: "Adriano", instrument: "guitarra", avail: { 0: { m: true, n: false }, 1: { m: true, n: false }, 2: { m: false, n: false }, 3: { m: true, n: false } } },
    { id: 8, name: "Wellerson", instrument: "teclado", avail: { 0: { m: true, n: false }, 1: { m: true, n: false }, 2: { m: true, n: false }, 3: { m: true, n: false } } },
    { id: 9, name: "Clésio", instrument: "teclado", avail: { 0: { m: false, n: true }, 1: { m: false, n: true }, 2: { m: false, n: true }, 3: { m: false, n: true } } },
    { id: 10, name: "Leandro Aguiar", instrument: "teclado", avail: { 0: { m: true, n: false }, 1: { m: false, n: false }, 2: { m: true, n: false }, 3: { m: false, n: false } } },
    { id: 11, name: "Wladia Pacheco", instrument: "teclado", avail: { 0: { m: false, n: false }, 1: { m: true, n: false }, 2: { m: false, n: false }, 3: { m: true, n: false } } },
    { id: 12, name: "Wellinton", instrument: "teclado", avail: { 0: { m: false, n: true }, 1: { m: false, n: false }, 2: { m: false, n: true }, 3: { m: false, n: false } } },
    { id: 13, name: "Paulo Beco", instrument: "baixo", avail: { 0: { m: true, n: true }, 1: { m: false, n: true }, 2: { m: false, n: false }, 3: { m: true, n: true } } },
    { id: 14, name: "Gab IBM", instrument: "baixo", avail: { 0: { m: false, n: true }, 1: { m: true, n: false }, 2: { m: true, n: true }, 3: { m: false, n: true } } },
    { id: 15, name: "Vinicius IBM", instrument: "baixo", avail: { 0: { m: true, n: false }, 1: { m: false, n: false }, 2: { m: true, n: false }, 3: { m: false, n: false } } },
    { id: 16, name: "Rafael Naso", instrument: "baixo", avail: { 0: { m: false, n: false }, 1: { m: true, n: true }, 2: { m: false, n: false }, 3: { m: true, n: true } } },
    { id: 17, name: "Rodrigo", instrument: "bateria", avail: { 0: { m: true, n: false }, 1: { m: true, n: false }, 2: { m: false, n: false }, 3: { m: true, n: false } } },
    { id: 18, name: "Rodrigo Serejo", instrument: "bateria", avail: { 0: { m: false, n: true }, 1: { m: false, n: true }, 2: { m: true, n: true }, 3: { m: false, n: true } } },
    { id: 19, name: "Eduardo Santos", instrument: "bateria", avail: { 0: { m: false, n: true }, 1: { m: true, n: true }, 2: { m: false, n: true }, 3: { m: true, n: false } } },
    { id: 20, name: "Vinícius Louzada", instrument: "bateria", avail: { 0: { m: true, n: false }, 1: { m: false, n: false }, 2: { m: true, n: false }, 3: { m: false, n: false } } },
    { id: 21, name: "Nelson Fernandes", instrument: "percussao", avail: { 0: { m: true, n: false }, 1: { m: true, n: false }, 2: { m: false, n: false }, 3: { m: true, n: false } } }
  ];

  let currentMusician = null;   // { id, name, instrument, avail }
  
  // Carregar disponibilidade salva no localStorage (para cada músico)
  function loadAvailabilityFromStorage() {
    const stored = localStorage.getItem("ibmeier_avail_individual");
    if (stored) {
      try {
        const savedAvails = JSON.parse(stored);
        // Atualizar cada músico com sua disponibilidade salva
        musicians.forEach(m => {
          if (savedAvails[m.id]) {
            m.avail = savedAvails[m.id];
          }
        });
      } catch(e) {}
    }
  }
  
  function saveAllAvailability() {
    const toSave = {};
    musicians.forEach(m => { toSave[m.id] = m.avail; });
    localStorage.setItem("ibmeier_avail_individual", JSON.stringify(toSave));
  }
  
  // Inicializar estrutura de avail para todos (caso algum campo faltante)
  function ensureAvailStructure() {
    musicians.forEach(m => {
      if (!m.avail) m.avail = {};
      DOMINGOS.forEach((_, idx) => {
        if (!m.avail[idx]) m.avail[idx] = { m: false, n: false };
        if (m.avail[idx].m === undefined) m.avail[idx].m = false;
        if (m.avail[idx].n === undefined) m.avail[idx].n = false;
      });
    });
  }
  
  // Renderizar o painel individual para o músico logado
  function renderPainelIndividual() {
    if (!currentMusician) return;
    const container = document.getElementById("painelIndividual");
    const instrLabel = INSTRUMENTOS[currentMusician.instrument] || currentMusician.instrument;
    
    // estatísticas: quantos domingos disponível (pelo menos um período)
    let totalDisponivel = 0;
    let totalManha = 0, totalNoite = 0;
    DOMINGOS.forEach((_, idx) => {
      const a = currentMusician.avail[idx];
      if (a?.m) totalManha++;
      if (a?.n) totalNoite++;
      if ((a?.m) || (a?.n)) totalDisponivel++;
    });
    
    let html = `
      <div class="painel-individual">
        <div class="hero-painel">
          <h1>Olá, ${currentMusician.name}</h1>
          <div class="badge-instrumento">${instrLabel}</div>
        </div>
        <div class="stats-mini">
          <div class="stat-mini-card"><div class="stat-mini-number">${totalDisponivel}</div><div class="stat-mini-label">Domingos disponível</div></div>
          <div class="stat-mini-card"><div class="stat-mini-number">${totalManha}</div><div class="stat-mini-label">Manhãs livres</div></div>
          <div class="stat-mini-card"><div class="stat-mini-number">${totalNoite}</div><div class="stat-mini-label">Noites livres</div></div>
        </div>
        <div class="info-aviso">
          💡 Marque os cultos que você pode servir. A equipe de liderança usará essas informações para montar a escala com revezamento.
        </div>
        <div class="disponibilidade-grade">
    `;
    
    DOMINGOS.forEach((dom, idx) => {
      const availDay = currentMusician.avail[idx] || { m: false, n: false };
      html += `
        <div class="semana-card">
          <div class="semana-header">
            <div class="data-domingo">${dom.label} <span>${dom.date} · Domingo</span></div>
            <div>🎵</div>
          </div>
          <div class="cultos-row">
            <div class="culto-item culto-manha">
              <div class="culto-info">
                <div class="culto-icon">☀️</div>
                <div class="culto-nome">Culto da Manhã <small>09h30 · 1º culto</small></div>
              </div>
              <label class="toggle-switch">
                <input type="checkbox" id="avail_m_${idx}" ${availDay.m ? 'checked' : ''}>

        <div class="info-aviso" style="margin-top:16px; background:rgba(212,168,83,0.05);">

        </div>
      </div>
    </div>`;
    
    container.innerHTML = html;
    container.style.display = "block";
    
    // Evento do botão salvar
    document.getElementById("btnSalvarDisponibilidade").addEventListener("click", () => {
      // Coletar novos valores dos toggles
      DOMINGOS.forEach((_, idx) => {
        const chkM = document.getElementById(`avail_m_${idx}`);
        const chkN = document.getElementById(`avail_n_${idx}`);
        if (!currentMusician.avail[idx]) currentMusician.avail[idx] = { m: false, n: false };
        currentMusician.avail[idx].m = chkM ? chkM.checked : false;
        currentMusician.avail[idx].n = chkN ? chkN.checked : false;
      });
      // Atualizar no array principal e salvar
      const indexInMain = musicians.findIndex(m => m.id === currentMusician.id);
      if (indexInMain !== -1) {
        musicians[indexInMain].avail = currentMusician.avail;
      }
      saveAllAvailability();
      showToast("Sua disponibilidade foi salva! ✅");

      renderPainelIndividual(); // rerender para atualizar contadores

  }
  
  // Preencher o select de login com os músicos
  function populateLoginSelect() {
    const select = document.getElementById("musicoSelectLogin");
    if (!select) return;
    select.innerHTML = '<option value="">-- Selecione seu nome --</option>';
    musicians.sort((a,b) => a.name.localeCompare(b.name)).forEach(m => {
      select.innerHTML += `<option value="${m.id}">${m.name} (${INSTRUMENTOS[m.instrument] || m.instrument})</option>`;
    });
  }
  
  // Efetuar login do músico
  function loginMusician(musicianId) {
    const musico = musicians.find(m => m.id == musicianId);
    if (!musico) {
      showToast("Músico não encontrado");
      return false;
    }
    currentMusician = { ...musico, avail: JSON.parse(JSON.stringify(musico.avail)) }; // clonar para edição
    document.getElementById("loginContainer").style.display = "none";
    document.getElementById("painelIndividual").style.display = "block";
    document.getElementById("logoutBtn").style.display = "flex";
    // atualizar header com nome
    const userArea = document.getElementById("headerUserArea");
    const logoutBtn = document.getElementById("logoutBtn");
    if (!document.querySelector(".user-chip")) {
      const chip = document.createElement("div");
      chip.className = "user-chip";
      chip.innerHTML = `<div class="user-avatar">${currentMusician.name[0].toUpperCase()}</div><span>${currentMusician.name}</span>`;
      userArea.insertBefore(chip, logoutBtn);
    } else {
      document.querySelector(".user-chip span").innerText = currentMusician.name;
    }
    renderPainelIndividual();
    return true;
  }
  
  function logout() {
    currentMusician = null;
    document.getElementById("loginContainer").style.display = "flex";
    document.getElementById("painelIndividual").style.display = "none";
    document.getElementById("logoutBtn").style.display = "none";
    const chip = document.querySelector(".user-chip");
    if (chip) chip.remove();
    // reset select
    document.getElementById("musicoSelectLogin").value = "";
    showToast("Você saiu do painel");
  }
  
  function showToast(msg) {
    const toast = document.getElementById("toastMsg");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2600);
  }
